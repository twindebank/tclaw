# tclaw configuration
#
# Top-level keys are environment names (local, prod, etc.).
# Use --env to select which section to load (default: local).
#
# System-derived paths (not configurable):
#   Socket:  <base_dir>/<user_id>/<channel_name>.sock
#   Home:    <base_dir>/<user_id>/home/
#   Store:   <base_dir>/<user_id>/store/
#
# Secret references:
#   ${secret:NAME}  — tries OS keychain first, falls back to env var
#   ${NAME}         — env var only
#
# Store secrets locally:  tclaw secret set ANTHROPIC_API_KEY sk-ant-...

local:
  base_dir: /tmp/tclaw

  # credentials:
  #   # Google Workspace (Gmail, Drive, Calendar, Docs, Sheets, Slides, Tasks)
  #   google:
  #     client_id: ${secret:GOOGLE_CLIENT_ID}
  #     client_secret: ${secret:GOOGLE_CLIENT_SECRET}
  #     # gws binary is auto-discovered from PATH or common install locations

  users:
    - id: default
      # api_key: ${secret:ANTHROPIC_API_KEY}  # uncomment if using an API key instead of OAuth
      model: claude-sonnet-4-6
      permission_mode: dontAsk
      # Optional: custom system prompt appended after tclaw's default.
      # system_prompt: |
      #   You are a personal assistant. Be concise and direct.

      # Tool groups control which tools are available.
      # See `tool_group_list` for all available groups with descriptions.
      tool_groups:
        - core_tools
        - all_builtins
        - channel_messaging
        - channel_management
        - scheduling
        - dev_workflow
        - repo_monitoring
        - gsuite_read
        - gsuite_write
        - personal_services
        - connections
        - telegram_client
        - notifications
        - onboarding
        - secret_form

      channels:
        - type: socket
          name: main
          description: Primary desktop workstation

        # Additional channels can use a restricted tool set:
        # - type: telegram
        #   name: mobile
        #   description: Mobile assistant — concise responses
        #   tool_groups:
        #     - core_tools
        #     - safe_builtins
        #     - channel_messaging
        #     - scheduling
        #     - notifications
        #     - personal_services
        #     - connections
        #     - secret_form
        #   telegram:
        #     token: ${secret:TELEGRAM_BOT_TOKEN}
        #     allowed_users: [123456789]  # your Telegram user ID
