# Deploy configuration for Fly.io.
#
# Secrets are resolved from environment variables injected by `fly secrets`.
# After config load, tclaw scrubs these env vars from the process so Claude
# subprocesses cannot read them.

base_dir: /data/tclaw
env: prod

server:
  addr: "0.0.0.0:9876"
  public_url: "https://your-app.fly.dev"

providers:
  google:
    client_id: ${secret:GOOGLE_CLIENT_ID}
    client_secret: ${secret:GOOGLE_CLIENT_SECRET}

users:
  - id: theo
    model: claude-sonnet-4-6
    permission_mode: dontAsk
    max_turns: 50
    channels:
      - type: socket
        name: main
        description: Primary channel
      - type: telegram
        name: telegram-prod
        description: Telegram
        token: ${secret:TELEGRAM_BOT_TOKEN_PROD}
        envs: [prod]
    allowed_tools:
      - "mcp__tclaw__*"
      - Bash
      - Read
      - Edit
      - Write
      - Glob
      - Grep
      - LS
      - LSP
      - WebFetch
      - WebSearch
      - NotebookEdit
      - Agent
      - Task
      - TaskOutput
      - TaskStop
      - TodoWrite
      - ToolSearch
      - Skill
      - AskUserQuestion
      - EnterPlanMode
      - ExitPlanMode
      - EnterWorktree
      - ListMcpResources
      - ReadMcpResource
