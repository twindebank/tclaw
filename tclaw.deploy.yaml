# Deploy configuration for Fly.io.
#
# Secrets are resolved from environment variables injected by `fly secrets`.
# After config load, tclaw scrubs these env vars from the process so Claude
# subprocesses cannot read them.

base_dir: /data/tclaw

oauth:
  callback_addr: "0.0.0.0:9876"

providers:
  google:
    client_id: ${secret:GOOGLE_CLIENT_ID}
    client_secret: ${secret:GOOGLE_CLIENT_SECRET}

users:
  - id: default
    api_key: ${secret:ANTHROPIC_API_KEY}
    model: claude-sonnet-4-6
    permission_mode: dontAsk
    channels:
      - type: socket
        name: main
        description: Primary channel
    allowed_tools:
      - Bash
      - Read
      - Edit
      - Write
      - Glob
      - Grep
      - LS
      - LSP
      - WebFetch
      - WebSearch
      - NotebookEdit
      - Agent
      - Task
      - TaskOutput
      - TaskStop
      - TodoWrite
      - ToolSearch
      - Skill
      - AskUserQuestion
      - EnterPlanMode
      - ExitPlanMode
      - EnterWorktree
      - ListMcpResources
      - ReadMcpResource
