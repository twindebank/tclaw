# Deploy configuration for Fly.io.
#
# Secrets are resolved from environment variables injected by `fly secrets`.
# After config load, tclaw scrubs these env vars from the process so Claude
# subprocesses cannot read them.

base_dir: /data/tclaw
env: prod

server:
  addr: "0.0.0.0:9876"
  public_url: "https://your-app.fly.dev"

providers:
  google:
    client_id: ${secret:GOOGLE_CLIENT_ID}
    client_secret: ${secret:GOOGLE_CLIENT_SECRET}

users:
  - id: theo
    model: claude-sonnet-4-6
    permission_mode: dontAsk
    max_turns: 50

    # Empty user-level tools — each channel defines its own permissions.
    allowed_tools: []

    channels:
      # Admin channel: full dev tools, channel/schedule/connection management,
      # all reset levels and builtins. No gsuite (use assistant channel for that).
      - type: telegram
        name: admin
        description: Primary admin channel
        token: ${secret:TELEGRAM_BOT_TOKEN_PROD}
        envs: [prod]
        allowed_tools:
          - Bash
          - Read
          - Edit
          - Write
          - Glob
          - Grep
          - LS
          - LSP
          - WebFetch
          - WebSearch
          - NotebookEdit
          - Agent
          - Task
          - TaskOutput
          - TaskStop
          - TodoWrite
          - ToolSearch
          - Skill
          - AskUserQuestion
          - EnterPlanMode
          - ExitPlanMode
          - EnterWorktree
          - ListMcpResources
          - ReadMcpResource
          - "mcp__tclaw__channel_*"
          - "mcp__tclaw__schedule_*"
          - "mcp__tclaw__connection_*"
          - "mcp__tclaw__remote_mcp_*"
          - "builtin__reset"
          - "builtin__stop"
          - "builtin__compact"
          - "builtin__login"
