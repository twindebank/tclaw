# tclaw configuration — keyed by environment.
#
# Secrets use ${secret:NAME} syntax:
#   1. Tries OS keychain (local dev)
#   2. Falls back to environment variables (production / Fly.io)
# After load, secret-bearing env vars are scrubbed from the process.

local:
  base_dir: /tmp/tclaw

  providers:
    google:
      client_id: ${secret:GOOGLE_CLIENT_ID}
      client_secret: ${secret:GOOGLE_CLIENT_SECRET}

  users:
    - id: theo
      model: claude-sonnet-4-6
      permission_mode: dontAsk

      # Empty user-level tools — each channel defines its own permissions.
      allowed_tools: []

      channels:
        - type: socket
          name: admin
          description: Primary desktop workstation for developing and testing
          role: superuser
        - type: socket
          name: scratch
          description: Scratch pad for quick experiments
          role: developer
        - type: telegram
          name: telegram-local
          description: Telegram messaging (dev bot)
          telegram:
            token: ${secret:TELEGRAM_BOT_TOKEN}
            allowed_users: [830516211]
          role: superuser

prod:
  base_dir: /data/tclaw

  server:
    addr: "0.0.0.0:9876"
    public_url: "https://tclaw.fly.dev"

  providers:
    google:
      client_id: ${secret:GOOGLE_CLIENT_ID}
      client_secret: ${secret:GOOGLE_CLIENT_SECRET}

  users:
    - id: theo
      model: claude-sonnet-4-6
      permission_mode: dontAsk
      max_turns: 50

      # Empty user-level tools — each channel defines its own permissions.
      allowed_tools: []

      channels:
        - type: telegram
          name: admin
          description: Primary admin channel
          telegram:
            token: ${secret:TELEGRAM_BOT_TOKEN_PROD}
            allowed_users: [830516211]
          role: superuser
