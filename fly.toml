app = "tclaw"
primary_region = "lhr"

[build]

[env]
  TCLAW_STORE_PATH = "/data/store"

[http_service]
  internal_port = 9876
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/healthz"
  timeout = "5s"

[mounts]
  source = "tclaw_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
