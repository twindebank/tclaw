name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    # Skip deploy for commits tagged [no-deploy] — e.g. doc-only or TODO changes.
    if: "!contains(github.event.head_commit.message, '[no-deploy]')"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      # tclaw.yaml is gitignored — write it from the TCLAW_YAML GitHub secret
      # so the Dockerfile COPY finds it. This is a seed config for first boot
      # only — it never overwrites the live config on the persistent volume.
      - name: Write tclaw.yaml
        run: echo "$TCLAW_YAML" > tclaw.yaml
        env:
          TCLAW_YAML: ${{ secrets.TCLAW_YAML }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Build locally on the GitHub runner (7GB RAM, plenty for gotd/td)
      # then push to Fly's registry. --local-only avoids the remote builder
      # which OOMs on the large gotd/td dependency.
      - name: Deploy
        run: flyctl deploy --local-only -a tclaw --build-arg COMMIT=$(git rev-parse --short HEAD)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
