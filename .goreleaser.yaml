version: 2

builds:
  - id: tclaw
    main: .
    binary: tclaw
    ldflags:
      - -s -w -X tclaw/internal/version.Commit={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: tclaw-chat
    main: ./cmd/chat
    binary: tclaw-chat
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "\\[no-deploy\\]"

release:
  github:
    owner: twindebank
    name: tclaw
  draft: true
